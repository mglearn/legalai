<svg viewBox="0 0 600 600" width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#1C4176"/>
      <stop offset="58%" stop-color="#102A54"/>
      <stop offset="100%" stop-color="#0A1A30"/>
    </radialGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F9FF"/>
      <stop offset="100%" stop-color="#C4CFDC"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF3F9"/>
      <stop offset="50%" stop-color="#C8D2DC"/>
      <stop offset="100%" stop-color="#93AFCE"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14294A"/>
      <stop offset="100%" stop-color="#081729"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBD27A"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B4901F"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#02060C" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- badge -->
  <circle cx="300" cy="300" r="298" fill="url(#bg)"/>
  <circle cx="300" cy="300" r="285" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.92"/>
  <circle cx="300" cy="300" r="272" fill="none" stroke="url(#metal)" stroke-width="2.5" opacity="0.6"/>

  <!-- antenna -->
  <line x1="300" y1="150" x2="300" y2="110" stroke="#C8D2DC" stroke-width="6" stroke-linecap="round"/>
  <circle cx="300" cy="101" r="12" fill="url(#gold)"/>

  <!-- ears -->
  <rect x="158" y="226" width="26" height="72" rx="12" fill="url(#metal)" stroke="#0B1D33" stroke-width="3"/>
  <rect x="416" y="226" width="26" height="72" rx="12" fill="url(#metal)" stroke="#0B1D33" stroke-width="3"/>

  <!-- head -->
  <g filter="url(#soft)">
    <rect x="180" y="150" width="240" height="214" rx="52" fill="url(#head)" stroke="#0B1D33" stroke-width="4"/>
  </g>

  <!-- visor -->
  <rect x="206" y="184" width="188" height="130" rx="42" fill="url(#visor)" stroke="#2A4E7A" stroke-width="2"/>
  <!-- eyes -->
  <g fill="#8FD2FF" filter="url(#glow)">
    <rect x="245" y="224" width="34" height="46" rx="17"/>
    <rect x="321" y="224" width="34" height="46" rx="17"/>
  </g>
  <!-- smile -->
  <path d="M260 289 Q300 315 340 289" fill="none" stroke="#8FD2FF" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>

  <!-- scales of justice emblem -->
  <g stroke="url(#gold)" stroke-linecap="round">
    <line x1="300" y1="398" x2="300" y2="488" stroke-width="7"/>
    <line x1="234" y1="420" x2="366" y2="420" stroke-width="7"/>
  </g>
  <circle cx="300" cy="396" r="9" fill="url(#gold)"/>
  <g stroke="url(#gold)" stroke-width="3" fill="none">
    <line x1="234" y1="420" x2="219" y2="452"/><line x1="234" y1="420" x2="249" y2="452"/>
    <line x1="366" y1="420" x2="351" y2="452"/><line x1="366" y1="420" x2="381" y2="452"/>
  </g>
  <path d="M213 452 A21 17 0 0 0 255 452 Z" fill="url(#gold)"/>
  <path d="M345 452 A21 17 0 0 0 387 452 Z" fill="url(#gold)"/>
  <path d="M281 488 L319 488 L332 506 L268 506 Z" fill="url(#gold)"/>
</svg>
