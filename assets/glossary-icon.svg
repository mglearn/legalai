  </defs>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#gl-bg)"/>
  <rect x="4.75" y="4.75" width="118.5" height="118.5" rx="25.25" fill="none" stroke="#6F8FAF" stroke-opacity="0.55" stroke-width="1.5"/>

