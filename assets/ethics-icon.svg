<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Legal ethics scenarios">
  <defs>
    <linearGradient id="eg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173766"/>
      <stop offset="1" stop-color="#0B1D33"/>
    </linearGradient>
    <linearGradient id="eg-silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF3F8"/>
      <stop offset="1" stop-color="#AEBDCE"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#eg-bg)"/>
  <rect x="4.75" y="4.75" width="118.5" height="118.5" rx="25.25" fill="none" stroke="#6F8FAF" stroke-opacity="0.55" stroke-width="1.5"/>

  <g fill="none" stroke="url(#eg-silver)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- central column -->
    <line x1="64" y1="30" x2="64" y2="94"/>
    <!-- beam -->
    <line x1="30" y1="44" x2="98" y2="44"/>
    <!-- chains to each pan -->
    <line x1="34" y1="44" x2="27" y2="60"/><line x1="34" y1="44" x2="41" y2="60"/>
    <line x1="94" y1="44" x2="87" y2="60"/><line x1="94" y1="44" x2="101" y2="60"/>
    <!-- base foot -->
    <line x1="48" y1="98" x2="80" y2="98"/>
  </g>

  <!-- pans: shallow bowls -->
  <path d="M23 60 h22 a11 11 0 0 1 -22 0 z" fill="url(#eg-silver)" stroke="#8DA1B6" stroke-width="1"/>
  <path d="M83 60 h22 a11 11 0 0 1 -22 0 z" fill="url(#eg-silver)" stroke="#8DA1B6" stroke-width="1"/>

  <!-- top pivot / AI accent -->
  <circle cx="64" cy="30" r="6" fill="#6F8FAF"/>
  <circle cx="64" cy="30" r="2.4" fill="#EEF3F8"/>
</svg>
