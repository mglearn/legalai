<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Two approaches to AI">
  <defs>
    <linearGradient id="ta-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173766"/>
      <stop offset="1" stop-color="#0B1D33"/>
    </linearGradient>
    <linearGradient id="ta-silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF3F8"/>
      <stop offset="1" stop-color="#AEBDCE"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#ta-bg)"/>
  <rect x="4.75" y="4.75" width="118.5" height="118.5" rx="25.25" fill="none" stroke="#6F8FAF" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- forking path: one stem splitting into two -->
  <g fill="none" stroke="url(#ta-silver)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M64 100 L64 70"/>
    <path d="M64 70 C64 56 44 56 36 42"/>
    <path d="M64 70 C64 56 84 56 92 42"/>
  </g>

  <!-- start node -->
  <circle cx="64" cy="100" r="6.5" fill="#6F8FAF"/>
  <circle cx="64" cy="100" r="2.6" fill="#EEF3F8"/>

  <!-- two destination nodes -->
  <circle cx="33" cy="37" r="9" fill="url(#ta-silver)" stroke="#8DA1B6" stroke-width="1"/>
  <circle cx="95" cy="37" r="9" fill="url(#ta-silver)" stroke="#8DA1B6" stroke-width="1"/>
</svg>
